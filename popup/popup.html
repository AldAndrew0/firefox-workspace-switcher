<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspace Tab Master</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <header class="panel-header">
    <div class="panel-title">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.9"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.7"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.7"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
      </svg>
      Workspace
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-save-current" title="Salva schede correnti nel workspace attivo">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M2 2h9l3 3v9a1 1 0 01-1 1H2a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="4.5" y="2" width="5" height="4" rx="0.5" fill="currentColor" opacity="0.7"/>
          <rect x="3" y="9" width="10" height="5" rx="0.5" fill="currentColor" opacity="0.5"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-dashboard" title="Apri Dashboard">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="9" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="9" y="1" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="9" y="7" width="6" height="8" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="1" y="12" width="6" height="3" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Workspace list -->
  <main>
    <div id="workspace-list" class="workspace-list">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" hidden>
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.3">
        <rect x="4" y="4" width="14" height="14" rx="3" fill="currentColor"/>
        <rect x="22" y="4" width="14" height="14" rx="3" fill="currentColor" opacity="0.7"/>
        <rect x="4" y="22" width="14" height="14" rx="3" fill="currentColor" opacity="0.7"/>
        <rect x="22" y="22" width="14" height="14" rx="3" fill="currentColor" opacity="0.4"/>
      </svg>
      <p>Nessuna area creata</p>
      <p class="hint">Crea la tua prima area di lavoro</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="panel-footer">
    <button class="footer-btn primary" id="btn-new">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Nuova area
    </button>
    <button class="footer-btn" id="btn-save-as-new" title="Salva le schede correnti come nuova area">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v8M5 6l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M2 15h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
      Cattura
    </button>
  </footer>

  <!-- Overlay switching -->
  <div id="switching-overlay" class="switching-overlay" hidden>
    <div class="spinner"></div>
    <span id="switching-label">Cambio area...</span>
  </div>

  <script src="../modules/storage-api.js"></script>
  <script src="../modules/theme-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
