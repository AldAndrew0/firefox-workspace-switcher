<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Configurazione Workspace</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <h1>Configurazione Workspace</h1>
    
    <div id="settings-check">
        <div id="session-warning" class="warning-box">
            ⚠️ <strong>Attenzione:</strong> Attiva "Ripristina sessione precedente" nelle impostazioni di Firefox 
            <span class="info-icon" title="Menu Firefox > Impostazioni > Generali > Avvio > Ripristina la sessione precedente">i</span>
        </div>
    </div>
    
    <div class="workspace-builder">
        <h2>I tuoi Gruppi</h2>
        <div id="groups-list">
            <!-- Caricato dinamicamente da JS -->
        </div>
        <button id="add-group" class="btn-main">+ Crea Nuovo Gruppo</button>
    </div>

    <script src="options.js"></script>
</body>
</html>
